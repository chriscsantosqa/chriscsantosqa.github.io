name: Apply experience update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-experience-update.yml

permissions:
  contents: write

jobs:
  update-experience:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update company and employment period
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          main = Path('js/main.js')
          content = main.read_text(encoding='utf-8')
          replacements = {
              "{year:'2023 —',company:'Empresa de tecnologia e saúde'": "{year:'2023 — atual',company:'4BIO Medicamentos Especiais'",
              "{year:'2023 —',company:'Technology and healthcare company'": "{year:'2023 — present',company:'4BIO Medicamentos Especiais'",
          }
          for old, new in replacements.items():
              if old not in content:
                  raise SystemExit(f'Expected text not found in js/main.js: {old}')
              content = content.replace(old, new, 1)
          main.write_text(content, encoding='utf-8')

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          old = '<div class="exp-year">2023 —</div>'
          new = '<div class="exp-year">2023 — atual</div>'
          if old not in html:
              raise SystemExit('Expected 4BIO period not found in index.html')
          index.write_text(html.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Validate JavaScript
        run: node --check js/main.js

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/main.js index.html
          git commit -m "fix: atualiza empresa e período profissional"
          git push
