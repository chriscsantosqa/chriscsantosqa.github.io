name: Apply professional period update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-period-update.yml

permissions:
  contents: write

jobs:
  update-periods:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update completed experience periods
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          main = Path('js/main.js')
          content = main.read_text(encoding='utf-8')
          companies = ('Lacrei Saúde', 'Crowdtest', 'uTest')
          for company in companies:
              old = "{year:'2023',company:'" + company + "'"
              new = "{year:'2023 - 2023',company:'" + company + "'"
              occurrences = content.count(old)
              if occurrences != 2:
                  raise SystemExit(f'Expected 2 occurrences for {company}, found {occurrences}')
              content = content.replace(old, new)
          main.write_text(content, encoding='utf-8')

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          markers = ('Lacrei Saúde', 'Crowdtest', 'uTest')
          for company in markers:
              company_pos = html.find(f'<h3>{company}</h3>')
              if company_pos < 0:
                  raise SystemExit(f'Company not found in index.html: {company}')
              year_pos = html.rfind('<div class="exp-year">2023</div>', 0, company_pos)
              if year_pos < 0:
                  raise SystemExit(f'Period not found before company: {company}')
              old = '<div class="exp-year">2023</div>'
              new = '<div class="exp-year">2023 - 2023</div>'
              html = html[:year_pos] + html[year_pos:].replace(old, new, 1)
          index.write_text(html, encoding='utf-8')
          PY

      - name: Validate JavaScript
        run: node --check js/main.js

      - name: Commit update and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-period-update.yml
          git add js/main.js index.html
          git commit -m "fix: adiciona data de encerramento das experiências"
          git push
